<nav class="navbar">
  <div class="navbar-left">
    <a routerLink="/" class="logo" aria-label="Home">
      <span class="logo-text">MemeMuseum</span>
    </a>
  </div>

  <div class="navbar-center">
    <button class="btn-multicolor" aria-label="Meme del Giorno" (click)="goToDailyMeme()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
        </polygon>
      </svg>
      <span>Meme del Giorno</span>
    </button>
  </div>

  <div class="navbar-right">

    @if (authService.isAuthenticated()) {
    <a routerLink="/create-meme" class="btn btn-create">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="create-icon">
        <path d="M12 5v14M5 12h14" />
      </svg>
      <span class="btn-label">Carica il tuo meme</span>
    </a>

    <div class="user-profile">
      <a routerLink="/profile" style="text-decoration: none; cursor: pointer;">
        <span class="username">@{{ authService.user() }}</span>
      </a>
      <button class="btn btn-secondary" (click)="authService.logout()">Logout</button>
    </div>
    } @else {
    <div class="auth-buttons">
      <a routerLink="/login" class="btn btn-secondary">Login</a>
      <a routerLink="/register" class="btn btn-primary">Registrati</a>
    </div>
    }
  </div>
</nav>
