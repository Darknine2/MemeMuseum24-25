<!-- Tag -->
<div class="form-group">
    <label for="meme-tags">Tag <span class="label-hint">(max 5 — premi Enter o virgola per
            aggiungere)</span></label>
    <div class="tags-input-wrapper">
        @for (tag of tagsToSearch; track tag) {
        <span class="tag-pill">
            #{{ tag }}
            <button type="button" class="tag-remove" (click)="removeTag(tag)" [attr.aria-label]="'Rimuovi tag ' + tag">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round">
                    <path d="M18 6 6 18M6 6l12 12" />
                </svg>
            </button>
        </span>
        }
        @if (tagsToSearch.length
        < 5) { <input id="meme-tags" type="text" [(ngModel)]="tagInput" name="tagInput"
            placeholder="es. gaming, funny..." (keydown)="onTagKeydown($event)" class="tag-input-field" />
        }
    </div>
</div>
