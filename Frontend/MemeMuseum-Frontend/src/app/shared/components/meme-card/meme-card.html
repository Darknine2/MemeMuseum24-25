@if (meme) {
<article class="meme-card">
  <!-- Intestazione della carta (Avatar, Subreddit, tempo) -->
  <div class="card-header">
    <div class="header-left">
      <img [src]="userAvatar" alt="Avatar" class="avatar" />
      <span class="author">{{ meme.Author?.username || 'Sconosciuto' }}</span>
      <span class="dot">•</span>
      <span class="time-ago">{{ meme.created_at | date:'shortTime' }}</span>
    </div>
    <button class="more-options-btn" aria-label="Altre opzioni">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1.5"></circle>
        <circle cx="19" cy="12" r="1.5"></circle>
        <circle cx="5" cy="12" r="1.5"></circle>
      </svg>
    </button>
  </div>

  <!-- Contenuto principale -->
  <div class="card-content">
    <h3 class="title">{{ meme.title }}</h3>

    @if (meme.Tags && meme.Tags.length > 0) {
      <div class="tag-list">
        @for (tag of meme.Tags; track tag.id) {
          <span class="tag-chip">#{{ tag.name }}</span>
        }
      </div>
    }

    <div class="image-container">
      <img [src]="'http://localhost:3000/' + meme.image_path" alt="Meme Image"
        style="width: 100%; height: auto; object-fit: contain; display: block;" />
    </div>
  </div>

  <!-- Barra delle azioni (Upvote, Commenti, Condividi) -->
  <div class="card-actions">
    <div class="action-group vote-group">
      <button class="action-btn upvote-btn" [class.active]="currentVote === 'up'" (click)="onVote('up')"
        aria-label="Upvote">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <use href="#up-arrow"></use>
          <path d="M12 4 L4 12 L9 12 L9 20 L15 20 L15 12 L20 12 Z" fill="none"></path>
        </svg>
      </button>

      <span class="vote-count" [style.color]="currentVote === 'up' ? '#4eb2b8' : (currentVote === 'down' ? '#7193ff' : 'white')">
        {{ meme.votes_count || 0 }}
      </span>

      <button class="action-btn downvote-btn" [class.active]="currentVote === 'down'" (click)="onVote('down')"
        aria-label="Downvote">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <use href="#down-arrow"></use>
          <path d="M12 20 L20 12 L15 12 L15 4 L9 4 L9 12 L4 12 Z" fill="none"></path>
        </svg>
      </button>
    </div>

    <button class="action-btn comment-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      Commenti
    </button>
  </div>
</article>
}
