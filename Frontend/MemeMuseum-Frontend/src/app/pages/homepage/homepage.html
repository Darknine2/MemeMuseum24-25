<div class="homepage-container">


    <div class="sticky-header">
      <!-- Search Bar -->
      <div class="search-bar-container">
        <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="applySearch()"
            placeholder="Cerca meme per titolo o descrizione..." class="search-input">
        <button class="search-btn" aria-label="Cerca" (click)="applySearch()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
    </div>

    <!-- Barra di Filtro e Ordinamento -->
    <div class="sort-bar">
        <button class="sort-tab" [class.active]="currentSort === ''" (click)="onSortChange('')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            Più Recenti
        </button>
        <button class="sort-tab" [class.active]="currentSort === 'oldest'" (click)="onSortChange('oldest')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 22h14"></path>
                <path d="M5 2h14"></path>
                <path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"></path>
                <path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"></path>
            </svg>
            Meno Recenti
        </button>
        <button class="sort-tab" [class.active]="currentSort === 'most_upvoted'" (click)="onSortChange('most_upvoted')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
            Più Votati
        </button>
        <button class="sort-tab" [class.active]="currentSort === 'most_downvoted'"
            (click)="onSortChange('most_downvoted')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            Meno Votati
        </button>

        <button class="sort-tab filter-tab" [class.active]="showFilters" (click)="toggleFilters()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
            Filtra
        </button>
    </div>

    @if (showFilters) {
    <div class="filter-panel">
        <app-tag-field [(tagsToSearch)]="tagsToSearch"></app-tag-field>

        <div class="date-filters">
            <label>
                <span>Da:</span>
                <input type="date" [(ngModel)]="filters.startDate">
            </label>
            <label>
                <span>A:</span>
                <input type="date" [(ngModel)]="filters.endDate">
            </label>
        </div>

        <div class="filter-actions">
            <button class="btn btn-secondary" (click)="resetFilters()">Reimposta</button>
            <button class="btn btn-primary" (click)="applyFilters()">Applica Filtri</button>
        </div>
    </div>
    }
    </div>

    @for (meme of memeList; track meme.id) {
    <app-meme-card [meme]="meme"></app-meme-card>
    }

    @if (isLoading) {
    <div style="text-align: center; padding: 20px; color: #818384;">
        Caricamento dei meme...
    </div>
    }
</div>
